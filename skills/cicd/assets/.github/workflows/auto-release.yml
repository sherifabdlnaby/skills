name: auto-release
# DRAFT model (alternative to release.yml): release-drafter keeps a categorized draft prerelease updated
# as PRs merge; a human publishes it (which can then fire build.yml / publish-sign.yml). Uses
# release-drafter.yml WITH its version-resolver uncommented. Use this OR release.yml, not both.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, edited] # autolabeler only; edited: re-apply labels on retitle

permissions:
  contents: read

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write # release-drafter maintains the draft release
      pull-requests: write # autolabeler labels PRs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # Drafter and autolabeler are separate actions since release-drafter v7.
      - name: Draft release notes
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        with:
          publish: false
          prerelease: true
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Autolabel PRs
        if: github.event_name == 'pull_request'
        uses: release-drafter/release-drafter/autolabeler@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
