name: Build, Test, and Scan
# Multi-arch image build, smoke test, and vulnerability scan on every push/PR. Builds natively on
# amd64 + arm64 runners (no QEMU), never pushes here (push happens in publish-sign.yml on release).
# Copy and adapt: set the image target/name and replace the smoke test with a real health check.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 5 * * 5" # weekly, so base-image CVEs surface without a push
  workflow_dispatch: {}

# CI runs cancel superseded (unlike publish jobs, which must queue). See SKILL.md "Always".
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build each arch on its own native runner — faster and truer than QEMU emulation.
  build:
    name: Build (${{ matrix.platform }})
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: app:test
          # Cache scoped per platform so the two arches don't evict each other.
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Smoke test
        run: |
          set -euo pipefail
          # Replace with a real check: the entrypoint runs and reports healthy.
          docker run --rm app:test --version

  security-scan:
    name: Security Scan (${{ matrix.platform }})
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: app:scan
          # Read-only reuse of the build job's cache; nothing reads a scan-specific scope, so no cache-to.
          cache-from: type=gha,scope=${{ matrix.platform }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # auth DB pulls to dodge anonymous rate limits
        with:
          # Two separate pins (GHSA-69fq-xp46-6x23): the ACTION at >= 0.35.0 (its older tags were
          # force-pushed), and the Trivy CLI past the compromised 0.69.4-0.69.6 builds.
          version: v0.71.2
          image-ref: app:scan
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          scanners: "vuln,secret"
          exit-code: "0" # report to the Security tab; don't fail the build on a known CVE

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always()
        with:
          sarif_file: trivy-results.sarif
          wait-for-processing: true
