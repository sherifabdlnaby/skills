# rumdl — Markdown linter/formatter. Auto-loaded from repo root. See skills/mise/references/hk.md.
# Scoped to TABLE rules only: this is a prose-heavy docs repo, and the full
# markdownlint set (esp. MD013 line-length) is ~400 issues of noise here.
# `enable` REPLACES the default rule set — only these rules run.

[global]
enable = ["MD055", "MD056", "MD058", "MD060"]
cache  = false # don't litter a .rumdl_cache/ dir; runs are over staged files only

# MD060 — table-cell-alignment (alias table-format). Off by default; the rule
# above turns it on. `aligned` pads every cell so columns line up visually
# (the cell-padding you want); other styles: aligned-no-space, compact, tight, any.
[MD060]
style = "aligned"
